<app-starfield />

<nav class="navbar">
    <div class="nav-inner">
        <!-- Logo + Title -->
        <a class="nav-brand" routerLink="/" (click)="closeMenu()">
            <div class="logo-frame">
                <img src="images/logo.jpg" alt="Nightfall Logo" width="40" height="40" />
            </div>
            <span class="brand-text">NIGHTFALL</span>
        </a>

        <!-- Lang Switch + Hamburger (mobile) -->
        <div class="nav-actions">
            <app-lang-switch />
            <button class="hamburger" [class.active]="menuOpen()" (click)="toggleMenu()" aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>

        <!-- Nav Links -->
        <ul class="nav-links" [class.open]="menuOpen()">
            <li>
                <a routerLink="/roles" routerLinkActive="active" (click)="closeMenu()">
                    {{ ls.t('nav_roles') }}
                </a>
            </li>
            <li>
                <a routerLink="/rulebook" routerLinkActive="active" (click)="closeMenu()">
                    {{ ls.t('nav_rulebook') }}
                </a>
            </li>
        </ul>
    </div>
</nav>

<main class="page-content">
    <router-outlet />
</main>
